<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS Hot Story Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <h1>SS Hot Story Portal</h1>
            <p>Welcome to the portal. Manage your content below.</p>
            
            <div class="admin-section">
                <h3>Post a New Story</h3>
                <input type="text" id="storyTitle" placeholder="Enter story title...">
                <textarea id="storyContent" rows="5" placeholder="Write your story here..."></textarea>
                <button onclick="postStory()">Publish Story</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
